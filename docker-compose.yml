version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    container_name: faq-backend
    volumes:
      - ./backend/faq.db:/app/faq.db
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: faq-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always
