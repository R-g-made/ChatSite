user  nginx;
worker_processes  1; # Обязательно 1 для 256 МБ!

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    include /etc/nginx/conf.d/*.conf; # Эта строка подключит твой default.conf
}
